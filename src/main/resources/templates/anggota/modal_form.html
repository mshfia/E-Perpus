<div id="main-fragment" th:fragment="content">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5>✏️ Form Anggota</h5>
        </div>

        <div class="card-body">
            <form th:action="@{/anggota/simpan}" th:object="${anggota}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">Nama Anggota</label>
                    <input type="text" th:field="*{nama}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nomor Anggota</label>
                    <input type="text" th:field="*{nomorAnggota}" class="form-control" required>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success">💾 Simpan</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">⬅ Kembali</button>
                </div>

            </form>
        </div>
    </div>
</div>
