<div id="main-fragment" th:fragment="content">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5>✏️ Form Buku</h5>
        </div>

        <div class="card-body">
            <form th:action="@{/buku/simpan}" th:object="${buku}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">Judul Buku</label>
                    <input type="text" th:field="*{judul}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pengarang</label>
                    <input type="text" th:field="*{pengarang}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Genre</label>
                    <input type="text" th:field="*{genre}" class="form-control">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" th:field="*{tersedia}">
                    <label class="form-check-label">Tersedia</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">💾 Simpan</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">⬅ Kembali</button>
                </div>

            </form>
        </div>
    </div>
</div>
