<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="layout">

<head th:fragment="header">
    <title>📚 Sistem Perpustakaan - Dashboard</title>
</head>

<body>

    <div th:fragment="content">
        <div class="row g-3">
            <div class="col-md-3">
                <a th:href="@{/buku}" class="text-decoration-none">
                    <div class="card bg-primary text-white shadow-sm h-100">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title small">📕 Total Buku</h6>
                                <h2 class="display-6 mb-0" th:text="${totalBuku}">0</h2>
                            </div>
                            <div class="fs-1">📚</div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-3">
                <a th:href="@{/anggota}" class="text-decoration-none">
                    <div class="card bg-success text-white shadow-sm h-100">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title small">👥 Total Anggota</h6>
                                <h2 class="display-6 mb-0" th:text="${totalAnggota}">0</h2>
                            </div>
                            <div class="fs-1">👥</div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-3">
                <a th:href="@{/peminjaman}" class="text-decoration-none">
                    <div class="card bg-info text-white shadow-sm h-100">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title small">📚 Total Peminjaman</h6>
                                <h2 class="display-6 mb-0" th:text="${totalPeminjaman}">0</h2>
                            </div>
                            <div class="fs-1">🧾</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</body>

</html>
