<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>📚 Sistem Perpustakaan</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }
    </style>

    <!-- Allow child templates to override/add head content -->
    <th:block th:replace="~{::header}"></th:block>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/}">📚 Perpustakaan</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/buku}">Buku</a>
                <a class="nav-link" th:href="@{/anggota}">Anggota</a>
                <a class="nav-link" th:href="@{/peminjaman}">Peminjaman</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- SLOT KONTEN: insert child content fragment here -->
        <div th:replace="~{::content}"></div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Modal skeleton and AJAX loader for form fragments -->
    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="mainModalBody">
                    <!-- loaded content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('click', function (e) {
            const el = e.target.closest('[data-modal]');
            if (!el) return;
            e.preventDefault();
            const url = el.getAttribute('href');
            if (!url) return;
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(r => r.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    // Try to find fragment marked with th:fragment="content" or element with id main-fragment
                    let frag = doc.querySelector('[th\\:fragment="content"]') || doc.querySelector('#main-fragment') || doc.body;
                    document.getElementById('mainModalBody').innerHTML = frag.innerHTML;
                    var modal = new bootstrap.Modal(document.getElementById('mainModal'));
                    modal.show();
                })
                .catch(err => console.error('Failed to load modal content', err));
        });
    </script>
</body>

</html>
