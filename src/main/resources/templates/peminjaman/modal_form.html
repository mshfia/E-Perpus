<div id="main-fragment" th:fragment="content">
    <div class="card shadow-sm">
        <div class="card-header">
            <h5>🔁 Form Peminjaman</h5>
        </div>

        <div class="card-body">
            <form th:action="@{/peminjaman/simpan}" th:object="${peminjaman}" method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label">Anggota</label>
                    <select th:field="*{anggota.id}" class="form-select" required>
                        <option th:each="a : ${listAnggota}" th:value="${a.id}" th:text="${a.nama}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Buku</label>
                    <select th:field="*{buku.id}" class="form-select" required>
                        <option th:each="b : ${listBuku}" th:value="${b.id}" th:text="${b.judul}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tanggal Pinjam</label>
                    <input type="date" th:field="*{tanggalPinjam}" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Tanggal Kembali</label>
                    <input type="date" th:field="*{tanggalKembali}" class="form-control" />
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success">💾 Simpan</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">⬅ Kembali</button>
                </div>

            </form>
        </div>
    </div>
</div>
